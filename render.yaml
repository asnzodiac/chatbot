services:
  - type: web
    name: adimma-kann
    env: python
    plan: free
    autoDeploy: true

    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt

    startCommand: |
      gunicorn bot:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120

    healthCheckPath: /

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
